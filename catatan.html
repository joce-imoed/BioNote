<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioNote - Catatan Saya</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f4f7f6; color: #333; }
        header { background-color: #2db300; color: white; padding: 20px; text-align: center; }
        nav { display: flex; justify-content: center; background-color: #208000; padding: 10px; }
        nav a { color: white; text-decoration: none; margin: 0 15px; font-weight: bold; }
        .container { max-width: 800px; margin: 30px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #208000; margin-bottom: 15px; }
        textarea { width: 100%; height: 300px; padding: 15px; border: 2px solid #ccc; border-radius: 8px; font-size: 1rem; resize: vertical; margin-bottom: 15px; }
        textarea:focus { outline: none; border-color: #2db300; }
        .status { font-size: 0.9rem; color: #666; font-style: italic; }
        .btn-back { display: inline-block; background-color: #0059b3; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; margin-top: 10px; }
    </style>
</head>
<body>

    <header>
        <h1>Buku Catatan BioNote 📝</h1>
    </header>

    <nav>
        <a href="index.html">Kembali ke Home</a>
    </nav>

    <div class="container">
        <h2>Tulis Rangkuman Belajarmu</h2>
        <p style="margin-bottom: 15px; color:#555;">Ketik materi penting di sini. Sistem akan otomatis menyimpan setiap huruf yang kamu ketik secara *real-time* ke browser.</p>
        
        <textarea id="noteArea" placeholder="Contoh: Bakteri adalah organisme prokariotik..."></textarea>
        
        <div class="status" id="saveStatus">Status: Tersimpan di perangkat lokal.</div>
        
        <br>
        <a href="index.html" class="btn-back">⬅ Kembali ke Home</a>
    </div>

    <script>
        const noteArea = document.getElementById('noteArea');
        const saveStatus = document.getElementById('saveStatus');

        // Mengambil catatan yang disimpan sebelumnya (jika ada)
        if(localStorage.getItem('bionote_rzk_notes')) {
            noteArea.value = localStorage.getItem('bionote_rzk_notes');
        }

        // Menyimpan secara otomatis ketika pengguna mengetik sesuatu
        noteArea.addEventListener('input', () => {
            localStorage.setItem('bionote_rzk_notes', noteArea.value);
            saveStatus.innerText = "Status: Mengetik... Otomatis menyimpan";
            
            setTimeout(() => {
                saveStatus.innerText = "Status: Semua perubahan telah disimpan secara lokal.";
            }, 1000);
        });
    </script>

</body>
</html>
